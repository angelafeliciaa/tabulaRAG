name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repo
        run: echo "REPO_LC=${REPO,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/backend:latest,ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/frontend:latest,ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}
