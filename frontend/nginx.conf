server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve JS/CSS assets directly
    location /assets/ {
        try_files $uri =404;
    }

    # SPA fallback (ONLY for non-asset routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}